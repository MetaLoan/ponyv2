app = "ponyv2-v16web"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile.fly"

[env]
  V16WEB_ADDR = ":8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory = "1024mb"
